AWSTemplateFormatVersion: "2010-09-09"
Description: "経費・交通費精算申請支援システム用ガードレール"

Resources:
  BedrockGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: "ecaas_agent_guardrail"
      Description: "経費・交通費精算申請支援システム用ガードレール。有害コンテンツ・プロンプトインジェクション・PII情報をブロックする。"

      # --- 入力ブロック時のフォールバック応答 ---
      BlockedInputMessaging: |
        申し訳ございませんが、この入力内容は処理できません。
        業務上の申請内容（交通費精算・経費精算）に関するご質問をお願いします。

      # --- 出力ブロック時のフォールバック応答 ---
      BlockedOutputsMessaging: |
        申し訳ございませんが、この応答内容は表示できません。
        担当者にお問い合わせください。

      # ============================================================
      # コンテンツポリシーフィルタ
      # ============================================================
      ContentPolicyConfig:
        ContentFiltersTierConfig:
          TierName: "STANDARD"
        FiltersConfig:
          - Type: "VIOLENCE"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "HATE"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "SEXUAL"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "INSULTS"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "MISCONDUCT"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          # PROMPT_ATTACK は入力側のみ（OutputStrength は NONE 固定）
          - Type: "PROMPT_ATTACK"
            InputStrength: "HIGH"
            OutputStrength: "NONE"
            InputAction: "BLOCK"

      # ============================================================
      # 単語ポリシー
      # ============================================================
      WordPolicyConfig:
        ManagedWordListsConfig:
          - Type: "PROFANITY"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

      # ============================================================
      # センシティブ情報ポリシー
      # ============================================================
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: "CREDIT_DEBIT_CARD_CVV"
            Action: "BLOCK"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

      # ============================================================
      # クロスリージョン設定（APACガードレールプロファイル）
      # ============================================================
      CrossRegionConfig:
        GuardrailProfileArn: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:guardrail-profile/apac.guardrail.v1:0"

      Tags:
        - Key: "Name"
          Value: "ecaas_agent_guardrail"
        - Key: "Region"
          Value: !Ref AWS::Region

Outputs:
  GuardrailId:
    Description: "Bedrock Guardrail のリソース ID"
    Value: !GetAtt BedrockGuardrail.GuardrailId
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailId"

  GuardrailVersion:
    Description: "Bedrock Guardrail のバージョン"
    Value: !GetAtt BedrockGuardrail.Version
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailVersion"
