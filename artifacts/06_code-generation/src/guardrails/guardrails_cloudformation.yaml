AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon Bedrock Guardrail for expense claim agent system

Resources:
  ExpenseClaimGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: expense-claim-agent-guardrail
      Description: 経費精算申請エージェントシステム用ガードレール
      BlockedInputMessaging: この入力は許可されていません。業務に関連する内容を入力してください。
      BlockedOutputsMessaging: この応答は生成できません。別の方法でお試しください。
      ContentPolicyConfig:
        FiltersConfig:
          - Type: VIOLENCE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: HATE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: SEXUAL
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: INSULTS
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: MISCONDUCT
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: PROMPT_ATTACK
            InputStrength: HIGH
            OutputStrength: NONE
      WordPolicyConfig:
        ManagedWordListsConfig:
          - Type: PROFANITY
        WordsConfig:
          - Text: 不正請求
          - Text: 架空経費
          - Text: 水増し
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: CREDIT_DEBIT_CARD_NUMBER
            Action: BLOCK
          - Type: US_SOCIAL_SECURITY_NUMBER
            Action: BLOCK
          - Type: EMAIL
            Action: ANONYMIZE
          - Type: PHONE
            Action: ANONYMIZE

Outputs:
  GuardrailId:
    Description: Guardrail ID
    Value: !GetAtt ExpenseClaimGuardrail.GuardrailId
  GuardrailVersion:
    Description: Guardrail Version
    Value: !GetAtt ExpenseClaimGuardrail.Version
