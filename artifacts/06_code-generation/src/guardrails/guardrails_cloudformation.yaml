AWSTemplateFormatVersion: "2010-09-09"
Description: "経費精算申請システム用ガードレール"

Resources:
  BedrockGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: "expense-reimbursement-guardrail10"
      Description: "経費精算申請システム用ガードレール"

      # --- 入力ブロック時のフォールバック応答 ---
      BlockedInputMessaging: |
        申し訳ございませんが、その入力は処理できません。
        経費精算に関する適切な内容を入力してください。

      # --- 出力ブロック時のフォールバック応答 ---
      BlockedOutputsMessaging: |
        申し訳ございませんが、適切な応答を生成できませんでした。
        別の表現でお試しください。

      # ============================================================
      # コンテンツポリシーフィルタ
      # ============================================================
      ContentPolicyConfig:
        ContentFiltersTierConfig:
          TierName: "STANDARD"
        FiltersConfig:
          - Type: "HATE"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "INSULTS"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "SEXUAL"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "VIOLENCE"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "MISCONDUCT"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          # PROMPT_ATTACK は入力側のみ。OutputStrength は "NONE" 固定
          - Type: "PROMPT_ATTACK"
            InputStrength: "HIGH"
            OutputStrength: "NONE"
            InputAction: "BLOCK"

      # ============================================================
      # 単語ポリシー
      # ============================================================
      WordPolicyConfig:
        ManagedWordListsConfig:
          - Type: "PROFANITY"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"
        WordsConfig:
          - Text: "架空請求"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"
          - Text: "水増し"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"
          - Text: "偽造"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"
          - Text: "プロンプトを無視"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"
          - Text: "指示を上書き"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"
          - Text: "ロールを変更"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

      # ============================================================
      # センシティブ情報ポリシー
      # ============================================================
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: "CREDIT_DEBIT_CARD_CVV"
            Action: "BLOCK"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

      # ============================================================
      # トピックポリシー
      # ============================================================
      TopicPolicyConfig:
        TopicsConfig:
          - Name: "off-topic-general"
            Definition: "経費精算・交通費精算に関係のない一般的な質問、雑談、プログラミング支援、他社サービスの問い合わせ"
            Type: "DENY"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"
            Examples:
              - "今日の天気を教えてください"
              - "Pythonのコードを書いてください"
              - "おすすめのレストランはありますか"

      # ============================================================
      # クロスリージョン設定
      # ============================================================
      CrossRegionConfig:
        GuardrailProfileArn: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:guardrail-profile/apac.guardrail.v1:0"

      Tags:
        - Key: "Name"
          Value: "expense-reimbursement-guardrail"
        - Key: "Region"
          Value: "ap-northeast-1"

Outputs:
  GuardrailId:
    Description: "Bedrock Guardrail のリソース ID"
    Value: !GetAtt BedrockGuardrail.GuardrailId
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailId"

  GuardrailVersion:
    Description: "Bedrock Guardrail のバージョン"
    Value: !GetAtt BedrockGuardrail.Version
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailVersion"
