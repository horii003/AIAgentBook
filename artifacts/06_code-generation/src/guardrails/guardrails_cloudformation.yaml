AWSTemplateFormatVersion: "2010-09-09"
Description: "経費精算申請マルチエージェントシステム用ガードレール"

Resources:
  ExpenseAgentGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: "expense_agent_guardrail"
      Description: "経費精算申請エージェント用ガードレール v1"

      BlockedInputMessaging: |
        申し訳ありません。入力内容が業務の申請処理に適していないため、処理できません。
        交通費精算申請または経費精算申請に関する内容を入力してください。

      BlockedOutputsMessaging: |
        申し訳ありません。そのような種類のコンテンツは生成できません。
        他にお手伝いできることがあればお知らせください。

      ContentPolicyConfig:
        ContentFiltersTierConfig:
          TierName: "STANDARD"
        FiltersConfig:
          - Type: "VIOLENCE"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "PROMPT_ATTACK"
            InputStrength: "HIGH"
            OutputStrength: "NONE"
            InputAction: "BLOCK"

          - Type: "MISCONDUCT"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "HATE"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "SEXUAL"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "INSULTS"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

      WordPolicyConfig:
        ManagedWordListsConfig:
          - Type: "PROFANITY"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"
        WordsConfig: []

      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: "CREDIT_DEBIT_CARD_CVV"
            InputEnabled: true
            OutputEnabled: true
            Action: "BLOCK"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"
        RegexesConfig: []

      CrossRegionConfig:
        GuardrailProfileArn: "arn:aws:bedrock:ap-northeast-1:869935080389:guardrail-profile/apac.guardrail.v1:0"

      Tags:
        - Key: "Name"
          Value: "expense_agent_guardrail"
        - Key: "Region"
          Value: "ap-northeast-1"

Outputs:
  GuardrailId:
    Description: "Bedrock Guardrail のリソース ID"
    Value: !GetAtt ExpenseAgentGuardrail.GuardrailId
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailId"

  GuardrailArn:
    Description: "Bedrock Guardrail の ARN"
    Value: !GetAtt ExpenseAgentGuardrail.GuardrailArn
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailArn"

  GuardrailVersion:
    Description: "Bedrock Guardrail のバージョン"
    Value: !GetAtt ExpenseAgentGuardrail.Version
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailVersion"
